syntax = "proto3";

package user_service;

option go_package = "learning-golang/api/gen";

message User {
    string id = 1;
    string name = 2;
    string email = 3;
    int64 created_at = 4;
    UserStatus status = 6;
}

enum UserStatus {
    USER_STATUS_INACTIVE = 0;
    USER_STATUS_ACTIVE = 1;
}

message CreateUserRequest {
    string email = 1;
    string name = 2;
    string password = 3;
}

message CreateUserResponse {
    User user = 1;
}

service UserService {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}
